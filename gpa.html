<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>حاسبة المعدل التراكمي - القسم العام</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f4f7f9; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 800px; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 2px solid #f1f5f9; padding-bottom: 15px; }
        h2 { color: #2c3e50; margin: 0; }
        .back-btn { text-decoration: none; color: #3498db; font-weight: bold; font-size: 14px; }
        
        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        th { background-color: #f8fafc; padding: 12px; text-align: center; color: #64748b; border-bottom: 2px solid #e2e8f0; }
        td { padding: 10px; border-bottom: 1px solid #f1f5f9; }
        
        input, select { width: 90%; padding: 8px; border: 1px solid #e2e8f0; border-radius: 5px; text-align: center; }
        
        .result-box { background: #2c3e50; color: white; padding: 20px; border-radius: 10px; display: flex; justify-content: space-around; font-size: 1.2rem; margin-top: 20px; }
        .result-item span { display: block; font-size: 0.8rem; opacity: 0.8; margin-bottom: 5px; }

        .add-row-btn { background: #27ae60; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin-bottom: 10px; font-weight: bold; }
        .add-row-btn:hover { background: #219150; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h2>🧮 حاسبة المعدل الدراسي</h2>
            <a href="index.html" class="back-btn">🏠 العودة للرئيسية</a>
        </div>

        <button class="add-row-btn" onclick="addRow()">+ إضافة مادة جديدة</button>

        <table id="gpaTable">
            <thead>
                <tr>
                    <th>المادة (اختياري)</th>
                    <th>عدد الساعات</th>
                    <th>الدرجة (من 100)</th>
                    <th>حذف</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr>
                    <td><input type="text" placeholder="مثلاً: رياضة 1"></td>
                    <td><input type="number" class="hours" value="3" min="1" oninput="calculateGPA()"></td>
                    <td><input type="number" class="grade" value="0" min="0" max="100" oninput="calculateGPA()"></td>
                    <td><button onclick="this.parentElement.parentElement.remove(); calculateGPA();" style="color:red; border:none; background:none; cursor:pointer;">❌</button></td>
                </tr>
            </tbody>
        </table>

        <div class="result-box">
            <div class="result-item">
                <span>إجمالي الساعات</span>
                <div id="totalHours">3</div>
            </div>
            <div class="result-item">
                <span>المعدل الفصلي (%)</span>
                <div id="gpaResult">0.00%</div>
            </div>
            <div class="result-item">
                <span>التقدير العام</span>
                <div id="gradeText">-</div>
            </div>
        </div>
    </div>

    <script>
        function addRow() {
            const tbody = document.getElementById('tableBody');
            const row = `<tr>
                <td><input type="text" placeholder="اسم المادة"></td>
                <td><input type="number" class="hours" value="3" min="1" oninput="calculateGPA()"></td>
                <td><input type="number" class="grade" value="0" min="0" max="100" oninput="calculateGPA()"></td>
                <td><button onclick="this.parentElement.parentElement.remove(); calculateGPA();" style="color:red; border:none; background:none; cursor:pointer;">❌</button></td>
            </tr>`;
            tbody.insertAdjacentHTML('beforeend', row);
        }

        function calculateGPA() {
            const hoursElements = document.getElementsByClassName('hours');
            const gradeElements = document.getElementsByClassName('grade');
            
            let totalWeightedGrades = 0;
            let totalHours = 0;

            for (let i = 0; i < hoursElements.length; i++) {
                const h = parseFloat(hoursElements[i].value) || 0;
                const g = parseFloat(gradeElements[i].value) || 0;
                
                totalWeightedGrades += (g * h);
                totalHours += h;
            }

            const gpa = totalHours > 0 ? (totalWeightedGrades / totalHours) : 0;
            
            document.getElementById('totalHours').innerText = totalHours;
            document.getElementById('gpaResult').innerText = gpa.toFixed(2) + "%";
            
            // تحديد التقدير
            let text = "-";
            if (gpa >= 85) text = "ممتاز";
            else if (gpa >= 75) text = "جيد جداً";
            else if (gpa >= 65) text = "جيد";
            else if (gpa >= 50) text = "مقبول";
            else if (gpa > 0) text = "ضعيف";
            
            document.getElementById('gradeText').innerText = text;
        }
    </script>
</body>
</html>
