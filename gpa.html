<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1200, initial-scale=0.4">
    <title>حاسبة المعدل | كلية الهندسة - جامعة الزاوية</title>
    <style>
        :root { 
            --primary: #2c3e50; --secondary: #f39c12; --bg: #f4f7f6; 
            --white: #ffffff; --danger: #e74c3c; --success: #27ae60; --muted: #7f8c8d;
            --card-border: #eee; --input-bg: #ffffff; --text-color: #333;
            --panel-bg: #f8fafc; --table-head: #f1f5f9;
        }

        [data-theme="dark"] {
            --bg: #121212; --white: #1e1e1e; --primary: #ecf0f1; --text-color: #e0e0e0;
            --card-border: #333; --input-bg: #2d2d2d; --panel-bg: #1a1a1a; --table-head: #252525; --muted: #bdc3c7;
        }

        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg); margin: 0; padding: 40px; color: var(--text-color); transition: 0.3s; }
        .container { max-width: 1250px; margin: auto; background: var(--white); padding: 40px; border-radius: 30px; box-shadow: 0 15px 40px rgba(0,0,0,0.1); }
        
        header { border-bottom: 3px solid var(--secondary); padding-bottom: 25px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; }
        .back-link { text-decoration: none; color: var(--primary); font-weight: bold; background: #ebedef; padding: 12px 25px; border-radius: 15px; }

        .header-btns { display: flex; gap: 10px; align-items: center; }
        .theme-btn { padding: 12px 20px; background: var(--primary); color: var(--white); border: 2px solid var(--secondary); border-radius: 12px; cursor: pointer; font-weight: bold; transition: 0.3s; }

        .controls-panel { background: var(--panel-bg); padding: 25px; border-radius: 20px; margin-bottom: 30px; display: flex; gap: 40px; border: 1px solid var(--card-border); align-items: center; }
        input[type="number"], select { padding: 10px; border-radius: 8px; border: 1px solid #ccc; font-weight: bold; background-color: var(--input-bg); color: var(--text-color); }
        input[type="number"] { width: 80px; text-align: center; }

        .sem-section { margin-bottom: 40px; border: 1px solid var(--card-border); border-radius: 20px; overflow: hidden; page-break-inside: avoid; }
        .sem-head { background: var(--table-head); padding: 15px 25px; display: flex; justify-content: space-between; font-weight: bold; align-items: center; }
        
        table { width: 100%; border-collapse: collapse; }
        th { background: var(--panel-bg); padding: 15px; font-size: 0.85rem; border-bottom: 2px solid var(--card-border); color: var(--muted); }
        td { padding: 12px; border-bottom: 1px solid var(--card-border); text-align: center; }

        .grade-badge { padding: 4px 10px; border-radius: 6px; font-size: 0.8rem; font-weight: bold; display: inline-block; min-width: 75px; }
        .grade-excel { background: #d4edda !important; color: #155724 !important; }
        .grade-vgood { background: #cce5ff !important; color: #004085 !important; }
        .grade-good { background: #fff3cd !important; color: #856404 !important; }
        .grade-pass { background: #e2e3e5 !important; color: #383d41 !important; }
        .grade-fail { background: #f8d7da !important; color: #721c24 !important; }

        .re-btn { padding: 8px 18px; border-radius: 25px; border: 1px solid #ddd; background: var(--input-bg); color: var(--text-color); cursor: pointer; transition: 0.2s; }
        .re-btn.active { background: var(--danger) !important; color: white !important; border-color: var(--danger); font-weight: bold; }

        .floating-results { 
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); 
            background: #2c3e50; color: white; padding: 18px 60px; border-radius: 100px; 
            display: flex; gap: 60px; box-shadow: 0 10px 40px rgba(0,0,0,0.4); border: 3px solid var(--secondary); z-index: 1000;
        }

        #print-summary { display: none; margin-top: 30px; padding: 30px; border: 3px solid #2c3e50; border-radius: 20px; background: #fff; color: #000; }

        @media print {
            .no-print, .floating-results, .back-link, .header-btns, button { display: none !important; }
            body { padding: 0; background: white; color: black; }
            .container { box-shadow: none; width: 100%; border: none; padding: 0; }
            #print-summary { display: block !important; }
            .sem-section { border: 1px solid #000; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <a href="index.html" class="back-link no-print">🏠 الرئيسية</a>
        <h2 style="margin:0; color: var(--primary);">حاسبة التقديرات | شجرة المواد الرسمية</h2>
        <div class="header-btns no-print">
            <button class="theme-btn" onclick="toggleTheme()" id="theme-btn">🌙 وضع ليلي</button>
            <button onclick="window.print()" style="padding:12px 25px; background:var(--secondary); color:white; border:none; border-radius:12px; font-weight:bold; cursor:pointer;">🖨️ طباعة</button>
        </div>
    </header>

    <div class="controls-panel no-print">
        <div>
            <label>عدد الفصول:</label>
            <input type="number" id="semCount" min="1" max="10" value="1" onchange="initApp()">
        </div>
        <div style="flex-grow:1">
            <label>المعدل المستهدف (%):</label>
            <input type="number" id="targetGPA" value="80" oninput="calculate()">
            <span id="targetMsg" style="margin-right:15px; font-weight:bold;"></span>
        </div>
    </div>

    <div id="semestersList"></div>

    <div id="print-summary">
        <h2 style="text-align: center;">تقرير المعدل الأكاديمي</h2>
        <h4 style="text-align: center;">كلية الهندسة - جامعة الزاوية</h4>
        <table style="width: 100%; font-size: 1.3rem; text-align: right; margin-top: 20px; color: black;">
            <tr>
                <td><b>المعدل التراكمي:</b></td>
                <td id="p-gpa" style="color: #f39c12; font-size: 1.8rem; font-weight: 900;">0.00%</td>
                <td><b>التقدير العام:</b></td>
                <td id="p-grade" style="font-weight: bold;">-</td>
            </tr>
            <tr>
                <td><b>الوحدات المنجزة:</b></td>
                <td id="p-units">0</td>
                <td><b>التاريخ:</b></td>
                <td>2026/03/28</td>
            </tr>
        </table>
    </div>

    <div class="floating-results no-print">
        <div style="text-align: center;"><small style="opacity:0.7">التراكمي العام</small><br><b id="f-gpa" style="color:var(--secondary); font-size:1.6rem;">0.00%</b></div>
        <div style="text-align: center;"><small style="opacity:0.7">التقدير العام</small><br><b id="f-grade">-</b></div>
        <div style="text-align: center;"><small style="opacity:0.7">إجمالي الوحدات المنجزة</small><br><b id="f-units">0</b></div>
    </div>
</div>

<script>
    function toggleTheme() {
        const body = document.documentElement;
        const currentTheme = body.getAttribute('data-theme');
        const targetTheme = currentTheme === 'dark' ? 'light' : 'dark';
        body.setAttribute('data-theme', targetTheme);
        localStorage.setItem('theme', targetTheme);
        document.getElementById('theme-btn').innerText = targetTheme === 'dark' ? '☀️ وضع نهاري' : '🌙 وضع ليلي';
    }

    const subjectsData = [
        { name: "رياضة 1 (GS101)", hours: 3 },
        { name: "رياضة 2 (GS102)", hours: 4 },
        { name: "رياضة 3 (GS203)", hours: 3 },
        { name: "رياضة 4 (GS204)", hours: 3 },
        { name: "برمجة حاسوب (GS200)", hours: 3 },
        { name: "الإحصاء والاحتمالات (GS206)", hours: 3 },
        { name: "التحليل العددي (GS309)", hours: 3 },
        { name: "استاتيكا (GE121)", hours: 3 },
        { name: "ديناميكا (GE222)", hours: 3 },
        { name: "كيمياء عامة (GS115)", hours: 3 },
        { name: "كيمياء معمل (L115-GS)", hours: 1 },
        { name: "فيزياء 1 (GS111)", hours: 3 },
        { name: "فيزياء 2 (GS112)", hours: 3 },
        { name: "فيزياء معمل (L112-GS)", hours: 1 },
        { name: "أسس هندسة كهربائية (GE280)", hours: 3 },
        { name: "رسم هندسي (GS126)", hours: 3 },
        { name: "لغة إنجليزية 1 (GH141)", hours: 2 },
        { name: "لغة إنجليزية 2 (GH142)", hours: 2 },
        { name: "لغة إنجليزية 3 (GH241)", hours: 2 },
        { name: "كتابة التقارير (GH450)", hours: 2 },
        { name: "لغة عربية 1 (GH150)", hours: 2 },
        { name: "لغة عربية 2 (GH151)", hours: 2 },
        { name: "ثقافة وطنية (GH299)", hours: 2 }
    ];

    function getGradeInfo(score) {
        if (score >= 85) return { text: "ممتاز", class: "grade-excel" };
        if (score >= 75) return { text: "جيد جداً", class: "grade-vgood" };
        if (score >= 65) return { text: "جيد", class: "grade-good" };
        if (score >= 50) return { text: "مقبول", class: "grade-pass" };
        if (score > 0) return { text: "ضعيف", class: "grade-fail" };
        return { text: "-", class: "" };
    }

    function initApp() {
        const count = parseInt(document.getElementById('semCount').value);
        const container = document.getElementById('semestersList');
        const currentSections = container.querySelectorAll('.sem-section').length;

        if (count > currentSections) {
            for (let i = currentSections + 1; i <= count; i++) {
                const div = document.createElement('div');
                div.className = 'sem-section';
                div.innerHTML = `
                    <div class="sem-head">
                        <span>الفصل الدراسي ${i}</span>
                        <div style="display:flex; gap:20px; align-items:center;">
                            <span id="sem-avg-${i}" style="font-weight:bold;">0.00%</span>
                            <span id="sem-grade-${i}" class="grade-badge"></span>
                        </div>
                    </div>
                    <table>
                        <thead>
                            <tr>
                                <th>اسم المادة (الرمز)</th><th style="width:10%">الوحدات</th><th style="width:12%">الدرجة</th>
                                <th style="width:15%">التقدير</th><th style="width:15%">الإعادة</th><th class="no-print" style="width:8%"></th>
                            </tr>
                        </thead>
                        <tbody id="tbody-${i}"></tbody>
                    </table>
                    <button class="no-print" style="margin:15px; cursor:pointer; padding:8px 15px; border-radius:8px; background:var(--primary); color:var(--white); border:none;" onclick="addRow(${i})">+ إضافة مادة من الشجرة</button>
                `;
                container.appendChild(div);
                addRow(i);
            }
        } else if (count < currentSections) {
            for (let i = currentSections; i > count; i--) {
                container.lastElementChild.remove();
            }
        }
        calculate();
    }

    function addRow(semId) {
        const tbody = document.getElementById(`tbody-${semId}`);
        const tr = document.createElement('tr');
        let options = subjectsData.map(s => `<option value="${s.hours}">${s.name}</option>`).join('');
        tr.innerHTML = `
            <td><select onchange="updateRow(this)" style="width:90%; padding:5px;"><option value="0">-- اختر من الشجرة --</option>${options}<option value="custom">مادة أخرى (يدوي)</option></select></td>
            <td><input type="number" class="h-val" value="0" readonly style="border:none; background:none; text-align:center; width:40px;"></td>
            <td><input type="number" class="g-val" value="0" oninput="calculate()" style="width:55px; font-weight:bold;"></td>
            <td><span class="grade-badge">-</span></td>
            <td><button class="re-btn" onclick="this.classList.toggle('active'); calculate();">إعادة</button></td>
            <td class="no-print"><button onclick="this.parentElement.parentElement.remove(); calculate();" style="border:none; background:none; cursor:pointer;">🗑️</button></td>`;
        tbody.appendChild(tr);
    }

    function updateRow(sel) {
        const hInput = sel.parentElement.nextElementSibling.querySelector('.h-val');
        if(sel.value === "custom") { hInput.readOnly = false; hInput.style.border = "1px solid #ddd"; hInput.value = 2; }
        else { hInput.readOnly = true; hInput.style.border = "none"; hInput.value = sel.value; }
        calculate();
    }

    function calculate() {
        let totalPoints = 0, gpaUnits = 0, earnedUnits = 0;
        const target = parseFloat(document.getElementById('targetGPA').value) || 0;

        document.querySelectorAll('.sem-section').forEach((sec, idx) => {
            let semP = 0, semH = 0;
            sec.querySelectorAll('tbody tr').forEach(row => {
                const h = parseFloat(row.querySelector('.h-val').value) || 0;
                const g = parseFloat(row.querySelector('.g-val').value) || 0;
                const isR = row.querySelector('.re-btn').classList.contains('active');
                
                const mGrade = getGradeInfo(g);
                const badge = row.querySelector('.grade-badge');
                badge.innerText = mGrade.text;
                badge.className = 'grade-badge ' + mGrade.class;

                if (h > 0) {
                    totalPoints += (g * h);
                    gpaUnits += h;
                    if (g >= 50 && !isR) earnedUnits += h;
                    semP += (g * h); semH += h;
                }
            });
            const sAvg = semH > 0 ? (semP / semH).toFixed(2) : "0.00";
            const currentIdx = idx + 1;
            if(document.getElementById(`sem-avg-${currentIdx}`)) {
                document.getElementById(`sem-avg-${currentIdx}`).innerText = sAvg + "%";
                const sGrade = getGradeInfo(parseFloat(sAvg));
                const sBadge = document.getElementById(`sem-grade-${currentIdx}`);
                sBadge.innerText = sGrade.text;
                sBadge.className = 'grade-badge ' + sGrade.class;
            }
        });

        const gpa = gpaUnits > 0 ? (totalPoints / gpaUnits).toFixed(2) : "0.00";
        const gInfo = getGradeInfo(parseFloat(gpa));

        ['f', 'p'].forEach(p => {
            document.getElementById(`${p}-gpa`).innerText = gpa + "%";
            document.getElementById(`${p}-units`).innerText = earnedUnits;
            document.getElementById(`${p}-grade`).innerText = gInfo.text;
        });

        const msg = document.getElementById('targetMsg');
        if (parseFloat(gpa) > 0) {
            msg.innerText = gpa >= target ? "✅ تم تحقيق الهدف" : `🛑 متبقي للهدف: ${(target - gpa).toFixed(2)}%`;
            msg.style.color = gpa >= target ? "var(--success)" : "var(--danger)";
        }
    }

    window.onload = function() {
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
        document.getElementById('theme-btn').innerText = savedTheme === 'dark' ? '☀️ وضع نهاري' : '🌙 وضع ليلي';
        initApp();
    };
</script>
</body>
</html>
