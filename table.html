<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>الجدول الدراسي الأسبوعي - نسخة الطباعة</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f4f7f9; 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }

        .header-container { 
            width: 100%; 
            max-width: 1100px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 20px; 
        }

        .actions { display: flex; gap: 10px; }

        .back-btn { 
            text-decoration: none; color: #fff; background: #3498db; 
            padding: 8px 15px; border-radius: 8px; font-size: 14px; font-weight: bold; 
        }

        /* زر الطباعة المطور */
        .print-btn {
            background-color: #27ae60;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .table-container { 
            width: 100%; 
            max-width: 1100px; 
            background: white; 
            padding: 30px; 
            border-radius: 15px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
        }

        table { width: 100%; border-collapse: collapse; table-layout: fixed; }

        th, td { 
            border: 1px solid #dee2e6; 
            padding: 12px; 
            text-align: center; 
            word-wrap: break-word;
        }

        th { background-color: #2c3e50; color: white; font-size: 15px; }

        .day-column { background-color: #f8fafc; font-weight: bold; width: 80px; }

        .subject-cell {
            height: 75px;
            font-size: 15px;
            outline: none;
            vertical-align: middle;
        }

        .time-slot { font-size: 11px; display: block; color: #cbd5e1; margin-top: 4px; }

        h2 { color: #2c3e50; margin: 0; }

        /* --- تنسيقات الطباعة (هنا السحر) --- */
        @media print {
            body { background: white; padding: 0; }
            .header-container, .back-btn, .print-btn { display: none !important; } /* إخفاء الأزرار عند الطباعة */
            .table-container { 
                box-shadow: none; 
                padding: 0; 
                width: 100%; 
                max-width: 100%;
            }
            table { border: 1px solid #000; }
            th { background-color: #eee !important; color: #000 !important; }
            /* إجبار المتصفح على طباعة الألوان الخلفية */
            * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        }
    </style>
</head>
<body>

    <div class="header-container">
        <h2>📅 الجدول الدراسي</h2>
        <div class="actions">
            <button class="print-btn" onclick="window.print()">
                🖨️ طباعة / حفظ PDF
            </button>
            <a href="index.html" class="back-btn">🏠 الرئيسية</a>
        </div>
    </div>

    <div class="table-container">
        <h3 style="text-align: center; color: #2c3e50; margin-bottom: 20px;">الجدول الدراسي الأسبوعي</h3>
        <table>
            <thead>
                <tr>
                    <th>اليوم</th>
                    <th>الأولى<br><span class="time-slot">08:30 - 10:30</span></th>
                    <th>الثانية<br><span class="time-slot">10:30 - 12:30</span></th>
                    <th>الثالثة<br><span class="time-slot">12:30 - 02:30</span></th>
                    <th>الرابعة<br><span class="time-slot">02:30 - 04:30</span></th>
                </tr>
            </thead>
            <tbody>
                <tr><td class="day-column">السبت</td><td class="subject-cell" contenteditable="true"></td><td class="subject-cell" contenteditable="true"></td><td class="subject-cell" contenteditable="true"></td><td class="subject-cell" contenteditable="true"></td></tr>
                <tr><td class="day-column">الأحد</td><td class="subject-cell" contenteditable="true"></td><td class="subject-cell" contenteditable="true"></td><td class="subject-cell" contenteditable="true"></td><td class="subject-cell" contenteditable="true"></td></tr>
                <tr><td class="day-column">الاثنين</td><td class="subject-cell" contenteditable="true"></td><td class="subject-cell" contenteditable="true"></td><td class="subject-cell" contenteditable="true"></td><td class="subject-cell" contenteditable="true"></td></tr>
                <tr><td class="day-column">الثلاثاء</td><td class="subject-cell" contenteditable="true"></td><td class="subject-cell" contenteditable="true"></td><td class="subject-cell" contenteditable="true"></td><td class="subject-cell" contenteditable="true"></td></tr>
                <tr><td class="day-column">الأربعاء</td><td class="subject-cell" contenteditable="true"></td><td class="subject-cell" contenteditable="true"></td><td class="subject-cell" contenteditable="true"></td><td class="subject-cell" contenteditable="true"></td></tr>
                <tr><td class="day-column">الخميس</td><td class="subject-cell" contenteditable="true"></td><td class="subject-cell" contenteditable="true"></td><td class="subject-cell" contenteditable="true"></td><td class="subject-cell" contenteditable="true"></td></tr>
            </tbody>
        </table>
    </div>

</body>
</html>
