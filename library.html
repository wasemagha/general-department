<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المكتبة الرقمية | القسم العام</title>
    <style>
        :root { --primary: #2c3e50; --secondary: #f39c12; --accent: #3498db; --bg: #f4f7f6; --white: #ffffff; --text-muted: #7f8c8d; --header-gradient: linear-gradient(135deg, #1a252f 0%, #2c3e50 100%); }
        [data-theme="dark"] { --bg: #121212; --white: #1e1e1e; --primary: #ecf0f1; --text-muted: #bdc3c7; --header-gradient: linear-gradient(135deg, #000000 0%, #1a252f 100%); }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg); margin: 0; color: var(--primary); transition: 0.3s; min-height: 100vh; }
        header { background: var(--header-gradient); color: white; padding: 40px 20px; text-align: center; border-bottom: 5px solid var(--secondary); position: relative; }
        .back-btn { position: absolute; top: 20px; right: 20px; background: var(--secondary); color: white; text-decoration: none; padding: 8px 15px; border-radius: 10px; font-weight: bold; font-size: 0.9rem; }
        .search-container { max-width: 600px; margin: -25px auto 40px; padding: 0 20px; position: relative; z-index: 10; }
        #searchBar { width: 100%; padding: 15px 25px; border-radius: 50px; border: none; box-shadow: 0 10px 25px rgba(0,0,0,0.1); font-size: 1.1rem; outline: none; background: var(--white); color: var(--primary); }
        .library-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; max-width: 1200px; margin: 0 auto 60px; padding: 0 25px; }
        .lib-card { background: var(--white); border-radius: 20px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 1px solid rgba(0,0,0,0.05); transition: 0.3s; display: flex; flex-direction: column; text-align: center; }
        .lib-card:hover { transform: translateY(-10px); border-color: var(--secondary); }
        .lib-card h3 { margin: 0 0 20px 0; font-size: 1.4rem; }
        .resource-links { display: flex; flex-direction: column; gap: 12px; }
        .res-btn {
            display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 14px 16px; border-radius: 16px; text-decoration: none;
            font-weight: 700; color: white; transition: transform 0.22s ease, box-shadow 0.22s ease, filter 0.22s ease; font-size: 0.97rem; cursor: pointer; border: none; width: 100%;
            box-shadow: 0 10px 18px rgba(0,0,0,0.12); position: relative; overflow: hidden;
        }
        .res-btn::before {
            content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, rgba(255,255,255,0.18), rgba(255,255,255,0)); pointer-events: none;
        }
        .btn-book { background: linear-gradient(135deg, #2f80d0, #4ca3e6); }
        .btn-sheets { background: linear-gradient(135deg, #229954, #2ecc71); }
        .btn-video { background: linear-gradient(135deg, #d64545, #ee5c5c); }
        .res-btn:hover { transform: translateY(-3px); filter: brightness(1.03); box-shadow: 0 14px 24px rgba(0,0,0,0.16); }
        .btn-label { display: inline-flex; align-items: center; gap: 10px; position: relative; z-index: 1; }
        .btn-icon {
            width: 34px; height: 34px; border-radius: 10px; display: inline-flex; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.18); box-shadow: inset 0 0 0 1px rgba(255,255,255,0.14); font-size: 1.05rem;
        }
        .btn-meta {
            min-width: 28px; height: 28px; padding: 0 8px; border-radius: 999px; display: inline-flex; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.16); font-size: 0.82rem; font-weight: 800; position: relative; z-index: 1;
        }
        .resource-accordion { display: flex; flex-direction: column; gap: 6px; border-radius: 16px; overflow: hidden; }
        .resource-list { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; display: flex; flex-direction: column; background: var(--white); border: 1px solid rgba(0,0,0,0.05); border-radius: 0 0 16px 16px; }
        .sub-item { padding: 12px 14px; text-decoration: none; color: var(--primary); border-bottom: 1px solid rgba(0,0,0,0.05); font-size: 0.92rem; display: flex; align-items: center; gap: 10px; transition: 0.2s; }
        .sub-item:hover { background: rgba(0,0,0,0.03); padding-right: 18px; }
        .sub-icon { width: 28px; height: 28px; border-radius: 8px; display: inline-flex; align-items: center; justify-content: center; background: rgba(52, 152, 219, 0.12); }
        .arrow { border: solid white; border-width: 0 2px 2px 0; display: inline-block; padding: 3px; transition: 0.3s; transform: rotate(45deg); margin-right: 2px; }
        .expanded .arrow { transform: rotate(-135deg); }
        .empty-state { grid-column: 1 / -1; background: var(--white); border: 1px dashed var(--secondary); border-radius: 20px; padding: 35px 20px; text-align: center; color: var(--text-muted); box-shadow: 0 10px 25px rgba(0,0,0,0.04); }
        footer { text-align: center; padding: 40px; color: var(--text-muted); font-size: 0.9rem; }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="back-btn">العودة للرئيسية</a>
        <h1>المكتبة الرقمية المركزية</h1>
        <p>جميع المصادر الدراسية في مكان واحد</p>
    </header>
    <div class="search-container"><input type="text" id="searchBar" placeholder="ابحث عن مادة معينة (مثلاً: رياضة 1)..." onkeyup="filterSubjects()"></div>
    <div class="library-grid" id="libraryGrid"><p id="loadingMsg">جارٍ تحميل المصادر...</p></div>
    <footer>تحديث لحظي من قاعدة بيانات القسم العام &copy; 2026</footer>
    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQbWh8v7WLlBzN-xNa6k0PAMu72PRn7sh8FBEB8HiANHka6jHlUaYYjqJRM3DSc7ShdbLL99xz-TGBT/pub?output=csv';
        let allSubjects = [];
        async function fetchLibraryData() {
            try {
                const response = await fetch(CSV_URL);
                const data = await response.text();
                const rows = data.split('\n').slice(1);
                allSubjects = rows.map(row => {
                    const columns = row.split(',');
                    return { name: columns[0]?.trim(), book: columns[1]?.trim(), sheets: columns[2]?.trim(), video: columns[3]?.trim() };
                }).filter(s => s.name);
                renderCards(allSubjects);
            } catch (error) {
                console.error('خطأ في جلب البيانات:', error);
                document.getElementById('loadingMsg').innerText = 'فشل تحميل البيانات.';
            }
        }
        function createButtonInner(title, icon, meta = '') {
            return `<span class="btn-label"><span class="btn-icon">${icon}</span><span>${title}</span></span>${meta ? `<span class="btn-meta">${meta}</span>` : ''}`;
        }
        function createSectionHTML(dataField, title, btnClass, icon) {
            if (!dataField || dataField.length < 5) return '';
            const links = dataField.split('|');
            if (links.length > 1) {
                return `<div class="resource-accordion"><button class="res-btn ${btnClass}" onclick="toggleAccordion(this)">${createButtonInner(title, icon, links.length)}<span class="arrow"></span></button><div class="resource-list">${links.map((link, index) => `<a href="${link.trim()}" target="_blank" class="sub-item"><span class="sub-icon">${icon}</span><span>الجزء ${index + 1}</span></a>`).join('')}</div></div>`;
            }
            return `<a href="${dataField}" target="_blank" class="res-btn ${btnClass}">${createButtonInner(title, icon)}</a>`;
        }
        function renderCards(data) {
            const container = document.getElementById('libraryGrid');
            container.innerHTML = '';
            if (!data.length) {
                container.innerHTML = `<div class="empty-state"><h3 style="margin-top:0; color: var(--primary);">لا توجد نتائج</h3><p style="margin-bottom:0;">جرّب كتابة اسم المادة بشكل مختلف أو امسح البحث لعرض جميع المواد.</p></div>`;
                return;
            }
            data.forEach(item => {
                const card = document.createElement('div');
                card.className = 'lib-card';
                const bookHTML = createSectionHTML(item.book, 'كتاب المادة', 'btn-book', '📘');
                const sheetsHTML = createSectionHTML(item.sheets, 'الشيتات', 'btn-sheets', '📄');
                const videoHTML = createSectionHTML(item.video, 'شرح فيديو', 'btn-video', '🎥');
                card.innerHTML = `<h3>${item.name}</h3><div class="resource-links">${bookHTML}${sheetsHTML}${videoHTML}</div>`;
                container.appendChild(card);
            });
        }
        function toggleAccordion(btn) {
            const container = btn.parentElement;
            const list = container.querySelector('.resource-list');
            container.classList.toggle('expanded');
            if (container.classList.contains('expanded')) list.style.maxHeight = list.scrollHeight + 'px';
            else list.style.maxHeight = '0';
        }
        function filterSubjects() {
            const term = document.getElementById('searchBar').value.toLowerCase();
            const filtered = allSubjects.filter(s => s.name.toLowerCase().includes(term));
            renderCards(filtered);
        }
        function applySavedTheme() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
        }
        window.onload = () => { applySavedTheme(); fetchLibraryData(); };
    </script>
</body>
</html>
